name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      matrix:
        php: [8.2, 8.3, 8.4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup PHP
        uses: shivammathur/setup-php@44724c9282fa1cf27681d428413c5d235bada07f
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, xml, pdo, pdo_sqlite, xdebug
          coverage: xdebug

      - name: Validate composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Run tests
        run: composer test

      - name: Run tests with coverage
        if: matrix.php == '8.4'
        run: |
          set -e
          if php -m | grep -q xdebug; then
            php -d xdebug.mode=coverage -d xdebug.start_with_request=yes vendor/bin/pest --coverage-clover=coverage.xml
          elif command -v phpdbg > /dev/null; then
            phpdbg -qrr vendor/bin/pest --coverage-clover=coverage.xml
          else
            echo 'No coverage driver available. Install xdebug or phpdbg.'
            exit 1
          fi

      - name: SonarCloud analysis
        if: matrix.php == '8.4' && env.SONAR_TOKEN != ''
        uses: sonarsource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e
        with:
          projectBaseDir: .
          organization: danielemontecchi
          projectKey: danielemontecchi_laravel-userstamps
          token: ${{ env.SONAR_TOKEN }}
          extraProperties: |
            sonar.php.coverage.reportPaths=coverage.xml
